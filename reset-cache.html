<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Command Platform v32.2 herstellen</title>
<style>
body{font-family:system-ui,sans-serif;background:#0c2033;color:#f7f9fc;padding:24px}
main{max-width:650px;margin:auto;background:#18354d;padding:24px;border:1px solid #42627a;border-radius:12px}
button{padding:12px 16px;border:1px solid #5da5df;border-radius:8px;background:#2878ba;color:white;font-weight:700}
#status{margin-top:14px;color:#c7d4df}
</style>
</head>
<body>
<main>
<h1>Command Platform v32.2 laden</h1>
<p>De tijdelijke app-cache wordt vervangen. Lokaal ingevoerde inzetgegevens blijven behouden.</p>
<button id="reset">Cache wissen en v32.2 openen</button>
<div id="status"></div>
</main>
<script>
document.getElementById('reset').onclick=async()=>{
  const status=document.getElementById('status');
  status.textContent='Bezig met vernieuwen…';
  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
    if('serviceWorker' in navigator){
      await navigator.serviceWorker.register('./sw.js?v=32.2.0',{updateViaCache:'none'});
      await navigator.serviceWorker.ready;
    }
    status.textContent='v32.2 is gereed. De app wordt geopend.';
    setTimeout(()=>location.replace('./?v=32.2.0&t='+Date.now()),600);
  }catch(error){
    status.textContent='Vernieuwen is niet volledig gelukt. Sluit de browser en open de app opnieuw.';
  }
};
</script>
</body>
</html>
